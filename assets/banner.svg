<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">After the Oracle</title>
  <desc id="desc">A banner showing a human judgment layer above verification and execution layers.</desc>
  <rect width="1200" height="420" fill="#F7F7F2"/>
  <rect x="36" y="36" width="1128" height="348" rx="18" fill="#FFFFFF" stroke="#111827" stroke-width="2"/>
  <g transform="translate(110 88)">
    <circle cx="115" cy="115" r="92" fill="#FFFFFF" stroke="#111827" stroke-width="8"/>
    <circle cx="115" cy="115" r="14" fill="#111827"/>
    <path d="M115 38 L139 112 L115 192 L91 118 Z" fill="#0E7C7B"/>
    <path d="M38 115 L112 91 L192 115 L118 139 Z" fill="#E6A23C" opacity="0.92"/>
    <line x1="115" y1="12" x2="115" y2="33" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
    <line x1="115" y1="197" x2="115" y2="218" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
    <line x1="12" y1="115" x2="33" y2="115" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
    <line x1="197" y1="115" x2="218" y2="115" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g transform="translate(390 86)">
    <text x="0" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" fill="#111827">After the Oracle</text>
    <text x="0" y="96" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#374151">A human judgment layer for AI-assisted work</text>
    <g transform="translate(0 142)">
      <rect x="0" y="0" width="620" height="54" rx="8" fill="#111827"/>
      <text x="24" y="35" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Human judgment layer</text>
      <rect x="0" y="72" width="540" height="54" rx="8" fill="#0E7C7B"/>
      <text x="24" y="107" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Verification layer</text>
      <rect x="0" y="144" width="460" height="54" rx="8" fill="#E6A23C"/>
      <text x="24" y="179" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Execution layer</text>
    </g>
  </g>
  <text x="70" y="366" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#4B5563">Plan before execution. Verify before trust. Escalate before irreversible action.</text>
</svg>

